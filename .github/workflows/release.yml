name: 'Release'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Bundle libmpv for macOS
        if: matrix.platform == 'macos-latest'
        run: |
          brew install mpv dylibbundler

          # Copy brew's libmpv into src-tauri/lib/
          MPV_PREFIX=$(brew --prefix mpv)
          cp "${MPV_PREFIX}/lib/libmpv.2.dylib" src-tauri/lib/libmpv.2.dylib

          # Collect ALL transitive dependencies into src-tauri/lib/ and rewrite paths
          dylibbundler -b \
            -x src-tauri/lib/libmpv.2.dylib \
            -d src-tauri/lib/ \
            -p @loader_path/ \
            -of

          # Also fix libmpv's own install name
          install_name_tool -id @loader_path/libmpv.2.dylib src-tauri/lib/libmpv.2.dylib

          # Build the frameworks list for tauri.conf.json from all dylibs in lib/
          FRAMEWORKS=$(find src-tauri/lib -name "*.dylib" | sed 's|src-tauri/||' | jq -R . | jq -s .)
          # Update tauri.conf.json with the full list
          jq --argjson fw "$FRAMEWORKS" '.bundle.macOS.frameworks = $fw' src-tauri/tauri.conf.json > src-tauri/tauri.conf.tmp.json
          mv src-tauri/tauri.conf.tmp.json src-tauri/tauri.conf.json

          echo "Bundled dylibs:"
          ls -la src-tauri/lib/*.dylib

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm install

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: app-v__VERSION__
          releaseName: 'Vega v__VERSION__'
          releaseBody: 'Automated release of Vega.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.platform == 'macos-latest' && '--target universal-apple-darwin' || '' }}

  release-android:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm install

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b

      - name: Build Android APK
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          VITE_TV_MODE: 'true'
        run: npm run tauri android build -- --apk

      - name: Sign APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # 1. Decode Keystore
          echo "$KEYSTORE_BASE64" | base64 --decode > release.jks
          
          # 2. Get the largest unsigned APK path
          UNSIGNED_APK=$(find src-tauri/gen/android/app/build/outputs/apk -name "*-unsigned.apk" | xargs ls -S | head -n 1)
          
          # 3. Locate the latest Android Build Tools on the GitHub Runner
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)
          
          # 4. Zipalign it
          $BUILD_TOOLS/zipalign -v -p 4 "$UNSIGNED_APK" app-aligned.apk
          
          # 5. Sign it
          $BUILD_TOOLS/apksigner sign --ks release.jks --ks-key-alias "$KEY_ALIAS" --ks-pass pass:"$KEYSTORE_PASSWORD" --key-pass pass:"$KEY_PASSWORD" --out vega-tv-android.apk app-aligned.apk

      - name: Get version
        run: echo "APP_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app-v${{ env.APP_VERSION }}
          files: vega-tv-android.apk
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
